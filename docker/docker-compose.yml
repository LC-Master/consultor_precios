name: locatel-consultant

services:
  nginx:
    image: nginx:latest
    container_name: locatel-pr
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./certs:/etc/nginx/ssl:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend-net
    depends_on:
      cds:
        condition: service_healthy
      consultant:
        condition: service_healthy
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  cds:
    image: cds:latest
    container_name: cds
    env_file: .env.cds
    networks:
      - backend-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    restart: always

  consultant:
    image: consultant:latest
    container_name: consultant
    env_file: .env.consultant
    networks:
      - backend-net
    depends_on:
      cds:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    restart: always

networks:
  backend-net:
    driver: bridge